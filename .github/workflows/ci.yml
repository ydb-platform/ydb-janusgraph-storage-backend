name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      ydb:
        image: ydbplatform/local-ydb:latest
        env:
          YDB_USE_IN_MEMORY_PDISKS: "true"
          GRPC_PORT: "2136"
        ports:
          - 2136:2136
        # hostname must be localhost: YDB discovery returns the node hostname,
        # and test clients on the runner reach it via the mapped localhost port
        options: >-
          --hostname localhost
          --health-cmd "bash -c 'exec 6<>/dev/tcp/localhost/2136'"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 60
          --health-start-period 30s
    env:
      YDB_ENDPOINT: grpc://localhost:2136
      YDB_DATABASE: /local
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'
          cache: maven
      - name: Run tests
        run: mvn -B --no-transfer-progress test

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'
          cache: maven
      - name: Set version from tag
        run: mvn -B --no-transfer-progress versions:set -DnewVersion=${GITHUB_REF_NAME#v}
      - name: Package
        run: mvn -B --no-transfer-progress -DskipTests package
      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: target/janusgraph-ydb-*.jar
          generate_release_notes: true
