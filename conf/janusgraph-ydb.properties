# Sample JanusGraph configuration for the YDB storage backend.
#
# JanusGraph resolves storage.backend either as a shorthand for built-in
# backends or as the full class name of a third-party StoreManager; external
# backends such as this one must use the full class name.

gremlin.graph=org.janusgraph.core.JanusGraphFactory
storage.backend=org.janusgraph.diskstorage.ydb.YdbStoreManager

storage.ydb.endpoint=grpc://localhost:2136
storage.ydb.database=/local
storage.ydb.directory=janusgraph
storage.ydb.auth-mode=anonymous

# Read mode: snapshot_ro (default, lock-free pooled reads + buffered atomic writes),
# stale_ro / online_ro (lower-latency reads), or serializable_rw (one interactive
# serializable transaction with commit-time conflict detection).
storage.ydb.read-tx-mode=snapshot_ro

# Activate storage-level query batching: multi-hop traversals fetch many
# adjacency slices in single round trips (getSlices / multiQuery).
query.batch.enabled=true
